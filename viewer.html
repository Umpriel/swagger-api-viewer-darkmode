<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenAPI Dark Viewer (No Server)</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
    <link rel="stylesheet" href="./SwaggerDark.css" />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #0b0f14; color: #e6edf3; font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif; }
      .topbar { display: none; }
      .toolbar { background: #0f141a; border-bottom: 1px solid #1f2a36; padding: 10px 16px; display: flex; gap: 12px; align-items: center; position: sticky; top: 0; z-index: 10; }
      .toolbar input[type="file"] { color: #e6edf3; }
      .toolbar .hint { opacity: .8; font-size: 12px; }
      #swagger { padding: 8px 0; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <input id="file" type="file" accept=".yaml,.yml,.json,.txt" />
      <span class="hint">Choose your OpenAPI file (.yaml/.yml/.json/.txt). No server needed.</span>
    </div>
    <div id="swagger"></div>

    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
    <script>
      const fileInput = document.getElementById('file');
      const containerId = '#swagger';

      function renderSpec(specObject) {
        document.querySelector(containerId).innerHTML = '';
        SwaggerUIBundle({
          spec: specObject,
          dom_id: containerId,
          deepLinking: true,
          displayRequestDuration: false,
          tryItOutEnabled: false,
          presets: [SwaggerUIBundle.presets.apis],
          layout: 'BaseLayout'
        });
      }

      async function parseContent(text) {
        // Try JSON first, then YAML
        try { return JSON.parse(text); } catch (_) {}
        try { return jsyaml.load(text); } catch (e) { throw e; }
      }

      async function handleFile(file) {
        if (!file) return;
        const text = await file.text();
        try {
          const spec = await parseContent(text);
          if (!spec || (typeof spec !== 'object')) throw new Error('Parsed spec is empty or invalid.');
          renderSpec(spec);
        } catch (err) {
          alert('Failed to load spec: ' + (err && err.message ? err.message : err));
        }
      }

      fileInput.addEventListener('change', () => handleFile(fileInput.files && fileInput.files[0]));

      // Optional: drag & drop support
      document.addEventListener('dragover', (e) => { e.preventDefault(); });
      document.addEventListener('drop', (e) => {
        e.preventDefault();
        if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFile(e.dataTransfer.files[0]);
        }
      });
    </script>
  </body>
</html>
